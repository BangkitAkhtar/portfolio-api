; Batas upload & eksekusi untuk API ini.
;
; Kenapa file ini ada, bukan mengandalkan cPanel MultiPHP INI Editor:
;   1. INI Editor menulis ke /home/<user>/portfolio-api/public/php.ini untuk versi PHP
;      yang dipilih di MultiPHP Manager (ea-php82), sementara domain ini sebenarnya
;      dieksekusi oleh PHP 8.4 — sehingga setting-nya tidak pernah terbaca dan PHP
;      memakai nilai bawaan (upload_max_filesize = 2M).
;   2. PHP-FPM (mode umum di cPanel) mengabaikan php.ini per-folder; yang dibaca
;      adalah .user.ini seperti file ini.
;
; Catatan: PHP menyimpan cache .user.ini selama user_ini.cache_ttl (default 300 detik),
; jadi perubahan bisa perlu ~5 menit untuk aktif.

upload_max_filesize = 32M
post_max_size = 40M
memory_limit = 256M
max_execution_time = 120
